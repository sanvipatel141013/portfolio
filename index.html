<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Club | Dada Bhagwan Repository Hub</title>
    <meta
      name="description"
      content="A polished GitHub Club website to explore Dada Bhagwan repositories with search, sorting, filtering, and responsive cards."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-blur blur-one" aria-hidden="true"></div>
    <div class="bg-blur blur-two" aria-hidden="true"></div>

    <header class="hero">
      <div class="container">
        <p class="eyebrow">GitHub Club</p>
        <h1>Dada Bhagwan Repositories, beautifully organized.</h1>
        <p class="subtitle">
          Explore and discover repositories in a smooth, modern interface. This site defaults to
          <strong>DadaBhagwan</strong> repositories and gives you fast search, sorting, and language filtering.
        </p>

        <form id="repoForm" class="repo-form" autocomplete="off">
          <label for="username" class="sr-only">GitHub username or organization</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="GitHub username / org (default: DadaBhagwan)"
            required
          />
          <button type="submit">Load Repositories</button>
        </form>

        <div class="quick-load" aria-label="Quick profile buttons">
          <button class="chip" data-user="DadaBhagwan" type="button">DadaBhagwan</button>
          <button class="chip" data-user="github" type="button">GitHub</button>
          <button class="chip" data-user="octocat" type="button">Octocat</button>
        </div>

        <div id="status" class="status" role="status" aria-live="polite"></div>
      </div>
    </header>

    <main class="container">
      <section class="toolbar">
        <div>
          <h2 id="sectionTitle">DadaBhagwan Repositories</h2>
          <p id="repoMeta" class="muted"></p>
        </div>

        <div class="controls">
          <label class="field">
            <span>Search</span>
            <input id="search" type="search" placeholder="Find repo by name or description" />
          </label>
          <label class="field">
            <span>Language</span>
            <select id="languageFilter">
              <option value="all">All languages</option>
            </select>
          </label>
          <label class="field">
            <span>Sort</span>
            <select id="sort">
              <option value="updated">Recently updated</option>
              <option value="stars">Most starred</option>
              <option value="name">Name (A-Z)</option>
            </select>
          </label>
        </div>
      </section>

      <section>
        <div id="repoGrid" class="repo-grid"></div>
      </section>
    </main>

    <template id="repoCardTemplate">
      <article class="repo-card">
        <div class="repo-top">
          <h3><a class="repo-link" target="_blank" rel="noopener noreferrer"></a></h3>
          <span class="badge"></span>
        </div>
        <p class="repo-desc"></p>
        <div class="repo-stats">
          <span class="stars">★ <strong></strong></span>
          <span class="forks">⑂ <strong></strong></span>
          <span class="updated"></span>
        </div>
      </article>
    </template>

    <script>
      const DEFAULT_USER = 'DadaBhagwan';

      const form = document.getElementById('repoForm');
      const usernameInput = document.getElementById('username');
      const statusEl = document.getElementById('status');
      const repoGrid = document.getElementById('repoGrid');
      const repoMeta = document.getElementById('repoMeta');
      const sectionTitle = document.getElementById('sectionTitle');
      const sortSelect = document.getElementById('sort');
      const searchInput = document.getElementById('search');
      const languageFilter = document.getElementById('languageFilter');
      const repoCardTemplate = document.getElementById('repoCardTemplate');
      const quickLoadButtons = document.querySelectorAll('.chip[data-user]');

      let repos = [];

      function formatDate(iso) {
        const date = new Date(iso);
        return date.toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      }

      function populateLanguageFilter(data) {
        const languages = [...new Set(data.map((repo) => repo.language).filter(Boolean))].sort((a, b) =>
          a.localeCompare(b)
        );

        languageFilter.innerHTML = '<option value="all">All languages</option>';
        languages.forEach((language) => {
          const option = document.createElement('option');
          option.value = language;
          option.textContent = language;
          languageFilter.appendChild(option);
        });
      }

      function getProcessedRepos() {
        const searchTerm = searchInput.value.trim().toLowerCase();
        const selectedLanguage = languageFilter.value;

        let result = [...repos];

        if (searchTerm) {
          result = result.filter((repo) => {
            const haystack = `${repo.name} ${repo.description || ''}`.toLowerCase();
            return haystack.includes(searchTerm);
          });
        }

        if (selectedLanguage !== 'all') {
          result = result.filter((repo) => repo.language === selectedLanguage);
        }

        if (sortSelect.value === 'stars') {
          result.sort((a, b) => b.stargazers_count - a.stargazers_count);
        } else if (sortSelect.value === 'name') {
          result.sort((a, b) => a.name.localeCompare(b.name));
        } else {
          result.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
        }

        return result;
      }

      function renderRepos(data) {
        repoGrid.innerHTML = '';

        if (!data.length) {
          repoGrid.innerHTML = `
            <article class="repo-card empty-state">
              <h3>No repositories match your filters.</h3>
              <p class="muted">Try a different search, language, or username.</p>
            </article>
          `;
          return;
        }

        const fragment = document.createDocumentFragment();

        data.forEach((repo) => {
          const card = repoCardTemplate.content.cloneNode(true);
          const link = card.querySelector('.repo-link');
          const badge = card.querySelector('.badge');
          const desc = card.querySelector('.repo-desc');
          const stars = card.querySelector('.stars strong');
          const forks = card.querySelector('.forks strong');
          const updated = card.querySelector('.updated');

          link.textContent = repo.name;
          link.href = repo.html_url;

          badge.textContent = repo.language || 'Misc';
          desc.textContent = repo.description || 'No description provided.';
          stars.textContent = repo.stargazers_count;
          forks.textContent = repo.forks_count;
          updated.textContent = `Updated ${formatDate(repo.updated_at)}`;

          fragment.appendChild(card);
        });

        repoGrid.appendChild(fragment);
      }

      function applyFilters() {
        const filtered = getProcessedRepos();
        renderRepos(filtered);
        repoMeta.textContent = `${filtered.length} shown • ${repos.length} total public repos`;
      }

      async function loadRepos(username) {
        statusEl.textContent = `Loading repositories for @${username}...`;
        statusEl.className = 'status';

        try {
          const response = await fetch(
            `https://api.github.com/users/${encodeURIComponent(username)}/repos?per_page=100&sort=updated`
          );

          if (!response.ok) {
            throw new Error(response.status === 404 ? 'User/org not found.' : 'Unable to fetch repositories.');
          }

          repos = await response.json();
          sectionTitle.textContent = `@${username} Repositories`;
          populateLanguageFilter(repos);
          applyFilters();

          statusEl.textContent = `Loaded ${repos.length} repositories for @${username}.`;
          statusEl.className = 'status success';

          localStorage.setItem('github-club-username', username);
        } catch (error) {
          repos = [];
          repoMeta.textContent = '';
          renderRepos([]);

          statusEl.textContent = error.message;
          statusEl.className = 'status error';
        }
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const username = usernameInput.value.trim();
        if (!username) return;
        loadRepos(username);
      });

      sortSelect.addEventListener('change', applyFilters);
      searchInput.addEventListener('input', applyFilters);
      languageFilter.addEventListener('change', applyFilters);

      quickLoadButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const user = button.dataset.user;
          usernameInput.value = user;
          loadRepos(user);
        });
      });

      const savedUsername = localStorage.getItem('github-club-username') || DEFAULT_USER;
      usernameInput.value = savedUsername;
      loadRepos(savedUsername);
    </script>
  </body>
</html>
